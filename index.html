<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>beamtv</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
}

/* Fullscreen video */
video {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    display: none;
}

/* black screen layer */
#black {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: black;
}
</style>
</head>

<body>

<div id="black"></div>

<video id="bootVideo" playsinline preload="auto">
    <source src="boot.mp4" type="video/mp4">
</video>

<script>
const video = document.getElementById("bootVideo");
const black = document.getElementById("black");

// force browser to start decoding early
video.load();

setTimeout(() => {
    black.style.display = "none";
    video.style.display = "block";

    // small delay helps some browsers render first frame cleanly
    requestAnimationFrame(() => {
        video.play();
    });

}, 3000);

video.onended = () => {
    video.style.display = "none";
    black.style.display = "block";

    setTimeout(() => {
        window.location.href = "recovery.html";
    }, 5000);
};
</script>

</body>
</html>
